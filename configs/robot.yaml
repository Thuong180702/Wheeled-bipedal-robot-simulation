# ============================================================
# Thông số vật lý robot Wheeled Bipedal (Real)
# Nguồn: URDF SolidWorks HOANTHIEN_TEST
# ============================================================

robot:
  name: "wheeled_biped_real"
  total_mass_kg: 8.1

  # --- Kích thước cơ bản (m) ---
  dimensions:
    thigh_length: 0.26
    shin_length: 0.28
    wheel_radius: 0.06
    wheel_width: 0.05
    hip_width: 0.23 # khoảng cách 2 hip (0.115 * 2)
    torso_size: [0.13, 0.07, 0.04] # half-size [x, y, z]

  # --- Khối lượng (kg) từ URDF ---
  masses:
    torso: 2.5 # thân + pin + mạch
    hip_roll_motor: 0.5 # eo
    hip_yaw_motor: 0.8 # xoay chân
    thigh: 0.8 # đùi
    shin: 0.6 # ống chân
    wheel_assembly: 0.1 # bánh xe

  # --- Giới hạn khớp (rad) ---
  joint_limits:
    hip_roll: [-0.7, 0.7]
    hip_yaw: [-0.4, 0.4]
    hip_pitch: [-0.5, 1.8]
    knee: [-0.5, 2.7]
    wheel: null # không giới hạn (quay tự do)

  # --- Mô-men xoắn tối đa (Nm) ---
  # hip_pitch dùng cùng loại motor với knee (ctrlrange=±30, forcerange=±44)
  torque_limits:
    hip_roll: 22.0
    hip_yaw: 22.0
    hip_pitch: 44.0
    knee: 44.0
    wheel: 22.0

  # --- Tư thế đứng mặc định (rad) ---
  # Dấu dương = gập về phía trước (mặt trước robot hướng -Y)
  default_standing_pose:
    hip_roll: 0.0
    hip_yaw: 0.0
    hip_pitch: 0.3
    knee: 0.5
    wheel: 0.0

# --- Cảm biến ---
sensors:
  imu:
    accelerometer: true
    gyroscope: true
    orientation_quat: true
    noise_accel_std: 0.01 # m/s²
    noise_gyro_std: 0.005 # rad/s
  encoders:
    position: true
    velocity: true
    noise_pos_std: 0.001 # rad
    noise_vel_std: 0.01 # rad/s

# --- MuJoCo simulation ---
simulation:
  timestep: 0.002 # 500 Hz physics
  policy_dt: 0.02 # 50 Hz control (mỗi 10 bước)
  integrator: "implicitfast"
  solver_iterations: 4
  solver_ls_iterations: 8

# ============================================================
# Training config: Stand Up / Height Transition (Stage 2)
# ============================================================
# Robot hoc chuyen doi chieu cao trong BalanceEnv range [0.40, 0.70]
# va phuc hoi tu nga / tu pose reset hoi vuot range (0.38/0.72).
# Warm-start tu balance checkpoint (obs=42, cung obs/action semantics voi BalanceEnv).

task:
  name: "stand_up"
  env: "StandUpEnv"
  episode_length: 1500 # 1500 x 0.02s = 30s (du dai cho transition day du)
  num_envs: 4096
  fallen_ratio: 0.3 # 30% episodes bat dau tu tu the nga, 70% dung

evaluation:
  mode: "jit_fixed_horizon"
  eval_envs: 256
  eval_episodes: 256

# --- PPO Hyperparameters ---
ppo:
  learning_rate: 2.0e-4 # lower than balance for warm-start fine-tuning
  num_epochs: 4
  num_minibatches: 8 # 4096x64/8 = 32768 samples/batch
  rollout_length: 64 # 1.28s rollout; reward is dense, episode still 30s
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2 # looser than balance because task changes from static standing
  entropy_coeff: 0.05 # higher than balance to explore recovery/height transitions
  value_loss_coeff: 0.5
  max_grad_norm: 0.5
  max_policy_kl: 0.05 # same guard as balance; rejects destructive warm-start updates
  normalize_advantages: true

# --- Network ---
network:
  policy_hidden: [256, 256, 128]
  value_hidden: [256, 256, 128]
  activation: "elu"
  init_std: 0.15 # khop balance de warm-start hoat dong dung

# --- Low-level controller ---
# Must match balance.yaml so balance -> stand_up warm-start keeps the same
# action semantics: policy action [-1, 1] -> PID target -> actuator torque.
low_level_pid:
  enabled: true
  action_smoothing_alpha: 0.4
  anti_windup_limit: 0.4
  wheel_vel_limit: 20.0
  kp: [55.0, 40.0, 70.0, 70.0, 4.0, 55.0, 40.0, 70.0, 70.0, 4.0]
  ki: [0.8, 0.4, 1.0, 1.0, 0.1, 0.8, 0.4, 1.0, 1.0, 0.1]
  kd: [3.0, 2.0, 4.0, 4.0, 0.0, 3.0, 2.0, 4.0, 4.0, 0.0]
  action_delay_steps: 0

# --- Reward weights ---
rewards:
  body_level: 1.5
  height: 2.0
  upright: 1.0
  natural_pose: 1.5
  symmetry: 0.3
  legs_forward: 0.3
  legs_vertical: 0.3
  alive: 0.5
  heading: 0.5
  position_drift: 0.3
  orientation: 0.5
  yaw_rate: 0.3
  joint_torque: -0.0005
  joint_velocity: -0.0002
  action_rate: -0.005

# --- Termination ---
termination:
  max_tilt_rad: 3.14 # gan vo han - khong terminate do tilt (robot bat dau nga)
  min_height: 0.05 # chi terminate khi roi khoi map

# --- Domain Randomization ---
domain_randomization:
  enabled: true
  mass_range: [0.9, 1.1]
  friction_range: [0.7, 1.3]
  joint_damping_range: [0.8, 1.2]
  # Keep model DR active, but do not add external push during stand-up recovery.
  push_interval: 500
  push_magnitude: 0
  push_duration: 5

# --- Sensor Noise & Observation Mode ---
# Must match balance.yaml for shape-compatible warm-start.
sensor_noise:
  enabled: true
  lin_vel_mode: "clean"
  lin_vel_std: 0.2
  ang_vel_std: 0.05
  gravity_std: 0.02
  joint_pos_std: 0.005
  joint_vel_std: 0.01

# ============================================================
# Training config: Stand Up / Height Transition (Stage 2)
# ============================================================
# Robot hoc chuyen doi chieu cao (dung len/ngoi xuong) va phuc hoi tu nga.
# Warm-start tu balance checkpoint (obs=40, khop kich thuoc).

task:
  name: "stand_up"
  env: "StandUpEnv"
  episode_length: 1500 # 1500 x 0.02s = 30s (du dai cho transition day du)
  num_envs: 4096
  fallen_ratio: 0.3 # 30% episodes bat dau tu tu the nga, 70% dung

# --- PPO Hyperparameters ---
ppo:
  learning_rate: 2.0e-4 # khop balance
  num_epochs: 4
  num_minibatches: 8 # 4096x64/8 = 32768 samples/batch (khop balance)
  rollout_length: 64 # phai co: default PPO la 32, can 64
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coeff: 0.05 # khop balance
  value_loss_coeff: 0.5
  max_grad_norm: 0.5
  normalize_advantages: true

# --- Network ---
network:
  policy_hidden: [256, 256, 128]
  value_hidden: [256, 256, 128]
  activation: "elu"
  init_std: 0.15 # khop balance de warm-start hoat dong dung

# --- Reward weights ---
rewards:
  body_level: 1.5
  height: 2.0
  upright: 1.0
  natural_pose: 1.5
  symmetry: 0.3
  alive: 0.5
  heading: 0.5
  position_drift: 0.3
  orientation: 0.5
  yaw_rate: 0.3
  joint_torque: -0.0005
  joint_velocity: -0.0002
  action_rate: -0.005

# --- Termination ---
termination:
  max_tilt_rad: 3.14 # gan vo han - khong terminate do tilt (robot bat dau nga)
  min_height: 0.05 # chi terminate khi roi khoi map

# --- Domain Randomization ---
domain_randomization:
  enabled: true
  mass_range: [0.9, 1.1]
  friction_range: [0.7, 1.3]
  joint_damping_range: [0.8, 1.2]

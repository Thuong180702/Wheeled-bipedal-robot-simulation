# ============================================================
# Training config: Wheeled Locomotion (Di chuyển bằng bánh)
# ============================================================

task:
  name: "wheeled_locomotion"
  env: "LocomotionEnv"
  episode_length: 1000
  num_envs: 4096

ppo:
  learning_rate: 3.0e-4
  num_epochs: 4
  num_minibatches: 32
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coeff: 0.008
  value_loss_coeff: 0.5
  max_grad_norm: 0.5
  normalize_advantages: true

network:
  policy_hidden: [256, 256, 128]
  value_hidden: [256, 256, 128]
  activation: "elu"
  init_std: 1.0

rewards:
  # Thưởng di chuyển theo hướng mục tiêu
  tracking_velocity: 1.5 # bám theo vận tốc mong muốn
  upright: 0.5
  height: 0.3
  joint_torque: -0.0001
  joint_velocity: -0.0001
  action_rate: -0.001
  alive: 0.1

# Lệnh điều khiển (vận tốc mong muốn)
command:
  lin_vel_x_range: [-1.0, 2.0] # m/s (lùi tới)
  ang_vel_z_range: [-1.5, 1.5] # rad/s (rẽ trái phải)
  resample_interval: 500 # đổi lệnh mỗi 500 steps

termination:
  max_tilt_rad: 0.7
  min_height: 0.3

domain_randomization:
  enabled: true
  mass_range: [0.9, 1.1]
  friction_range: [0.6, 1.4]
  joint_damping_range: [0.8, 1.2]
  push_interval: 300
  push_magnitude: 40.0

# ============================================================
# Training config: Walking (Đi bộ bằng chân)
# ============================================================

task:
  name: "walking"
  env: "WalkingEnv"
  episode_length: 1500
  num_envs: 4096

ppo:
  learning_rate: 2.0e-4
  num_epochs: 5
  num_minibatches: 32
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coeff: 0.005
  value_loss_coeff: 0.5
  max_grad_norm: 0.5
  normalize_advantages: true

network:
  policy_hidden: [512, 256, 128]
  value_hidden: [512, 256, 128]
  activation: "elu"
  init_std: 0.8

rewards:
  tracking_velocity: 1.5
  foot_clearance: 0.5 # nâng chân đủ cao
  gait_symmetry: 0.3 # dáng đi đối xứng
  upright: 0.5
  height: 0.3
  joint_torque: -0.0002
  joint_velocity: -0.0001
  action_rate: -0.002
  foot_contact: 0.3 # thưởng tiếp đất đúng nhịp
  alive: 0.1

command:
  lin_vel_x_range: [0.1, 1.0] # chỉ đi tới
  ang_vel_z_range: [-0.5, 0.5]
  resample_interval: 400

# Tham số dáng đi
gait:
  step_frequency: 1.5 # Hz (bước/s)
  swing_height: 0.05 # chiều cao nâng chân (m)
  stance_ratio: 0.6 # thời gian chân chạm đất / chu kỳ

termination:
  max_tilt_rad: 0.6
  min_height: 0.25

domain_randomization:
  enabled: true
  mass_range: [0.85, 1.15]
  friction_range: [0.5, 1.5]
  joint_damping_range: [0.7, 1.3]
  push_interval: 250
  push_magnitude: 35.0

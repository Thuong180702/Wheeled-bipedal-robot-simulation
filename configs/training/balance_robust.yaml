# ============================================================
# Training config: Balance Robust (Stage 3)
# ============================================================
# Robot chịu lực ngẫu nhiên mạnh ở bất kì chiều cao nào.
# Warm-start từ stand_up checkpoint.
# Full height range [0.38, 0.70] ngay từ đầu (không curriculum).
# Push mạnh hơn: 40N, mỗi 4s.

task:
  name: "balance_robust"
  env: "BalanceEnv"
  episode_length: 1000 # 1000 × 0.02s = 20s
  num_envs: 4096
  # Không curriculum — full range ngay từ đầu
  height_curriculum_steps: 0
  initial_min_height: 0.38 # full range [0.38, 0.70] từ episode đầu tiên

# --- PPO Hyperparameters ---
ppo:
  learning_rate: 1.0e-4 # nhỏ hơn để fine-tune từ checkpoint (vs 2e-4 balance)
  num_epochs: 4
  num_minibatches: 8
  rollout_length: 64
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coeff: 0.03 # giảm xuống để khai thác tốt hơn (vs 0.05 balance)
  value_loss_coeff: 0.5
  max_grad_norm: 0.5
  normalize_advantages: true

# --- Network ---
network:
  policy_hidden: [256, 256, 128]
  value_hidden: [256, 256, 128]
  activation: "elu"
  init_std: 0.15

# --- Low-level controller ---
# IMPORTANT: Must be enabled=true and use the same gains as balance.yaml.
# Without this section BalanceEnv defaults to pid_enabled=False (direct-torque mode),
# which has completely different action semantics from the PID-trained checkpoint.
# Silently switching modes would break warm-start fine-tuning.
# action_smoothing_alpha and gains are kept identical to balance.yaml;
# only action_delay_steps is kept at 0 (match sim_prototyping mode in stage 1).
low_level_pid:
  enabled: true
  action_smoothing_alpha: 0.4
  anti_windup_limit: 0.4
  wheel_vel_limit: 20.0
  kp: [55.0, 40.0, 70.0, 70.0, 4.0, 55.0, 40.0, 70.0, 70.0, 4.0]
  ki: [0.8, 0.4, 1.0, 1.0, 0.1, 0.8, 0.4, 1.0, 1.0, 0.1]
  kd: [3.0, 2.0, 4.0, 4.0, 0.0, 3.0, 2.0, 4.0, 4.0, 0.0]
  action_delay_steps: 0

# --- Reward weights ---
# OBJECTIVE: Push-recovery robustness — survive and recover from large impulsive forces
# (push_magnitude=40N, push_interval=200 steps = 4 s).
#
# Separation note — differences versus balance.yaml explained:
#
#   no_motion    → 0.0   (was 0.5 in balance)
#     Reason: During/after a push the robot *must* move wheels to prevent falling.
#     Rewarding stillness would directly fight the recovery reflex.
#
#   wheel_velocity → 0.0  (was -0.002 in balance)
#     Reason: The wheels are the primary balancing actuators under push.
#     Penalising wheel speed would punish the exact behaviour needed for recovery.
#
#   action_rate  → -0.005  (was -0.05 in balance)
#     Reason: The step immediately after push impact requires a rapid correction
#     (wheel velocity changes from 0 → large in one step). action_rate=-0.05
#     was fighting that correction with ~10× the effect of balance.yaml's penalty
#     relative to the typical single-step reward. Reducing to -0.005 keeps
#     anti-jitter at steady state while not punishing the recovery burst.
#     NOTE: Do NOT zero this fully — small anti-jitter is still useful at rest.
#
#   natural_pose → 1.5  (increased from 0.4 in balance; both use σ=0.5 in BalanceEnv)
#     Reason: The policy should return to a natural stance AFTER recovery, and this
#     stronger weight encourages convergence to a consistent resting posture.
#     σ=0.8 is permissive enough that transient recovery lean is not heavily penalised.
#
# Terms unchanged from balance (identical value):
#   body_level (1.5), orientation (0.8), yaw_rate (0.5)
#
# Terms changed (balance → robust):
#   height        2.5 → 1.5    (push survival risk outweighs strict height tracking)
#   symmetry      1.0 → 0.3    (lateral lean tolerated during recovery)
#   alive         0.3 → 0.5    (stronger survival incentive under push)
#   heading       0.5 → 1.0    (push can spin robot; stronger yaw correction)
#   legs_forward  0.5 → 0.3    (relaxed posture tolerance during recovery)
#   legs_vertical 0.5 → 0.3    (relaxed posture tolerance during recovery)
#   position_drift 1.5 → 1.0   (push displaces robot; allow slightly more drift)
#   joint_torque  -0.0005 → -0.001   (tighter torque budget in robust mode)
#   joint_velocity -0.0007 → -0.0005 (looser joint velocity budget under push)
rewards:
  body_level: 1.5
  height: 1.5
  natural_pose: 1.5
  symmetry: 0.3
  alive: 0.5
  heading: 1.0
  legs_forward: 0.3
  legs_vertical: 0.3
  position_drift: 1.0
  orientation: 0.8
  yaw_rate: 0.5
  # === Recovery-safe: standing-specific terms zeroed out ===
  no_motion: 0.0    # zeroed — wheels must spin to recover from push
  wheel_velocity: 0.0 # zeroed — wheels are primary balancing actuators under push
  # === Penalties ===
  joint_torque: -0.001
  joint_velocity: -0.0005
  action_rate: -0.005  # reduced 10× vs balance (-0.05): allows fast post-push corrections

# --- Termination ---
termination:
  max_tilt_rad: 0.8 # ngã > 46° thì kết thúc
  min_height: 0.3

# --- Domain Randomization ---
domain_randomization:
  enabled: true
  mass_range: [0.85, 1.15] # biến động ±15% (đồng nhất với stage 1)
  friction_range: [0.6, 1.4] # biến động ±40% (cao hơn stage 1: ±30%)
  joint_damping_range: [0.7, 1.3]
  push_interval: 200 # push mỗi 4s
  push_magnitude: 40 # lực mạnh hơn (40N; Stage 1 uses push_magnitude=0)
  push_duration: 8 # kéo dài hơn (8 steps = 0.16s vs 5 steps = 0.1s)

# --- Sensor Noise & Observation Mode ---
# Must match the balance.yaml mode used in Stage 1 (checkpoint warm-start
# requires identical obs_size).  Change both files together.
sensor_noise:
  enabled: true
  lin_vel_mode: "clean"   # keep consistent with balance.yaml
  lin_vel_std: 0.2
  ang_vel_std: 0.05
  gravity_std: 0.02
  joint_pos_std: 0.005
  joint_vel_std: 0.01


# ============================================================
# Training config: Balance Robust (Stage 3)
# ============================================================
# Robot chịu lực ngẫu nhiên mạnh ở bất kì chiều cao nào.
# Warm-start từ stand_up checkpoint.
# Full height range [0.38, 0.72] ngay từ đầu (không curriculum).
# Push mạnh hơn: 40N, mỗi 3s.

task:
  name: "balance_robust"
  env: "BalanceEnv"
  episode_length: 1000 # 1000 × 0.02s = 20s
  num_envs: 4096
  # Không curriculum — full range ngay từ đầu
  height_curriculum_steps: 0
  initial_min_height: 0.38 # full range [0.38, 0.72] từ episode đầu tiên

# --- PPO Hyperparameters ---
ppo:
  learning_rate: 1.0e-4 # nhỏ hơn để fine-tune từ checkpoint (vs 2e-4 balance)
  num_epochs: 4
  num_minibatches: 8
  rollout_length: 64
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coeff: 0.03 # giảm xuống để khai thác tốt hơn (vs 0.05 balance)
  value_loss_coeff: 0.5
  max_grad_norm: 0.5
  normalize_advantages: true

# --- Network ---
network:
  policy_hidden: [256, 256, 128]
  value_hidden: [256, 256, 128]
  activation: "elu"
  init_std: 0.15

# --- Reward weights ---
# OBJECTIVE: Push-recovery robustness — survive and recover from large impulsive forces
# (push_magnitude=40N, push_interval=200 steps = 4 s).
#
# Separation note — differences versus balance.yaml explained:
#
#   no_motion    → 0.0   (was 0.5 in balance)
#     Reason: During/after a push the robot *must* move wheels to prevent falling.
#     Rewarding stillness would directly fight the recovery reflex.
#
#   wheel_velocity → 0.0  (was -0.0006 in balance)
#     Reason: The wheels are the primary balancing actuators under push.
#     Penalising wheel speed would punish the exact behaviour needed for recovery.
#
#   action_rate  → -0.005  (was -0.02 in balance)
#     Reason: The step immediately after push impact requires a rapid correction
#     (wheel velocity changes from 0 → large in one step). action_rate=-0.02
#     was fighting that correction with ~3× the effect of balance.yaml's penalty
#     relative to the typical single-step reward. Reducing to -0.005 keeps
#     anti-jitter at steady state while not punishing the recovery burst.
#     NOTE: Do NOT zero this fully — small anti-jitter is still useful at rest.
#
#   natural_pose → 1.5  (same numerical value as balance, both σ=0.8)
#     This is intentionally kept: the policy should return to a natural stance
#     AFTER recovery, not maintain an arbitrary leaning posture under push.
#     σ=0.8 is permissive enough that transient recovery lean is not heavily penalised.
#
# Terms kept identical (safe for both objectives):
#   body_level, height, symmetry, alive, heading, legs_forward, legs_vertical,
#   position_drift, orientation, yaw_rate, joint_torque, joint_velocity
rewards:
  body_level: 1.5
  height: 1.5
  natural_pose: 1.5
  symmetry: 0.3
  alive: 0.5
  heading: 1.0
  legs_forward: 0.3
  legs_vertical: 0.3
  position_drift: 1.0
  orientation: 0.8
  yaw_rate: 0.5
  # === Recovery-safe: standing-specific terms zeroed out ===
  no_motion: 0.0    # zeroed — wheels must spin to recover from push
  wheel_velocity: 0.0 # zeroed — wheels are primary balancing actuators under push
  # === Penalties ===
  joint_torque: -0.001
  joint_velocity: -0.0005
  action_rate: -0.005  # reduced 4× vs balance (-0.02): allows fast post-push corrections

# --- Termination ---
termination:
  max_tilt_rad: 0.8 # ngã > 46° thì kết thúc
  min_height: 0.3

# --- Domain Randomization ---
domain_randomization:
  enabled: true
  mass_range: [0.85, 1.15] # biến động ±15% (cao hơn stage 1: ±10%)
  friction_range: [0.6, 1.4] # biến động ±40% (cao hơn stage 1: ±30%)
  joint_damping_range: [0.7, 1.3]
  push_interval: 200 # push mỗi 4s
  push_magnitude: 40 # lực mạnh hơn (40N vs 20N stage 1)
  push_duration: 8 # kéo dài hơn (8 steps = 0.16s vs 5 steps = 0.1s)


# ============================================================
# Training config: Rough Terrain (Địa hình gồ ghề)
# ============================================================

task:
  name: "rough_terrain"
  env: "TerrainEnv"
  episode_length: 2000
  num_envs: 2048

ppo:
  learning_rate: 3.0e-4
  num_epochs: 5
  num_minibatches: 4
  rollout_length: 32
  gamma: 0.995
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coeff: 0.005
  value_loss_coeff: 1.0
  max_grad_norm: 0.5
  normalize_advantages: true

network:
  policy_hidden: [512, 256, 128]
  value_hidden: [512, 256, 128]
  activation: "elu"
  init_std: 0.5

rewards:
  tracking_velocity: 1.5
  upright: 1.0
  height: 0.5
  foot_contact: 0.5
  body_stability: 0.5 # phạt rung lắc thân
  joint_torque: -0.0002
  action_rate: -0.003
  alive: 0.2

# Cấu hình địa hình
terrain:
  type: "heightfield"
  size: [10.0, 4.0] # m
  resolution: 0.05 # m/pixel
  # Curriculum terrain difficulty
  difficulty_levels:
    - name: "mild"
      max_height: 0.03 # ±3cm
      frequency: 0.5
    - name: "moderate"
      max_height: 0.06
      frequency: 1.0
    - name: "hard"
      max_height: 0.10
      frequency: 1.5
    - name: "extreme"
      max_height: 0.15
      frequency: 2.0

command:
  lin_vel_x_range: [0.2, 1.5]
  ang_vel_z_range: [-1.0, 1.0]
  resample_interval: 500

termination:
  max_tilt_rad: 1.0
  min_height: 0.15

domain_randomization:
  enabled: true
  mass_range: [0.85, 1.15]
  friction_range: [0.4, 1.6]
  joint_damping_range: [0.7, 1.3]
  push_interval: 200
  push_magnitude: 50.0

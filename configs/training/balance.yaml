# ============================================================
# Training config: Balance (Đứng vững)
# ============================================================

task:
  name: "balance"
  env: "BalanceEnv"
  episode_length: 1000 # 1000 steps × 0.02s = 20s
  num_envs: 4096 # số env song song trên GPU
  # Height curriculum: mở rộng dần khoảng height_command
  # Ban đầu [0.68, 0.72] (gần keyframe), dần mở rộng → [0.38, 0.72]
  height_curriculum_steps: 100000 # per-env steps, tăng từ 40000→80000 để robot thích nghi dần
  initial_min_height: 0.68 # min ban đầu (keyframe=0.71)

# --- PPO Hyperparameters ---
ppo:
  learning_rate: 2.0e-4 # giảm từ 3e-4 → ổn định hơn với minibatch nhỏ
  num_epochs: 2 # CPU: giảm từ 4→2, tránh reuse data quá nhiều với batch nhỏ (4)
  num_minibatches: 4 # CPU: 128×64÷4=2048 samples/batch (vs 1024 trước) — ổn định hơn (8)
  rollout_length: 64
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.3 # CPU: nới rộng từ 0.2→0.3, cho phép policy update lớn hơn với ít data
  entropy_coeff: 0.05 # tăng từ 0.03 → ngăn entropy collapse mạnh hơn
  value_loss_coeff: 0.5
  max_grad_norm: 0.5
  normalize_advantages: true

# --- Network ---
network:
  policy_hidden: [256, 256, 128]
  value_hidden: [256, 256, 128]
  activation: "elu"
  init_std: 0.15 # std ban đầu cho action distribution (nhỏ hơn vì ctrlrange rộng)

# --- Reward weights ---
# Tập trung tín hiệu chính: tư thế đúng + chiều cao + thân ngang
# Tổng thưởng max ≈ 11.6, phạt nhẹ
rewards:
  body_level: 1.5 # thưởng thân nằm ngang (exp σ_roll=0.15, σ_pitch=0.15)
  height: 1.5 # thưởng giữ chiều cao theo height_command (exp σ=0.25)
  natural_pose: 1.5 # thưởng hp/kn đúng target TUYỆT ĐỐI (exp σ=0.8 — gradient mạnh)
  symmetry: 0.3 # thưởng 2 chân đối xứng (exp σ=0.5) — giảm vì natural_pose đã xử lý
  alive: 0.5 # thưởng sống sót (signal luôn có)
  heading: 1.5 # tăng 1.0→1.5: phá local optimum "spinning balance"
  legs_forward: 0.5
  legs_vertical: 0.5
  position_drift: 1.5 # tăng 1.0→1.5: phạt mạnh hơn khi robot drift theo vòng xoáy
  orientation: 0.8
  yaw_rate: 1.5 # tăng 0.5→1.5: phạt trực tiếp tốc độ quay yaw
  # === ĐÃ LOẠI BỎ (xung đột hoặc trùng lặp) ===
  no_motion: 0.0 # ❌ XUNG ĐỘT: robot bánh xe CẦN velocity để cân bằng
  wheel_velocity: 0.0 # ❌ XUNG ĐỘT: bánh xe là công cụ cân bằng chính
  # === Phạt (giữ nhẹ) ===
  joint_torque: -0.001 # phạt mô-men lớn
  joint_velocity: -0.0005 # phạt tốc độ khớp — giảm (bao gồm cả wheel vel)
  action_rate: -0.02 # tăng từ -0.002 → -0.02: chống rung, action mượt hơn

# --- Termination ---
termination:
  max_tilt_rad: 0.8 # ngã > 46° (0.8 rad) thì kết thúc
  min_height: 0.3 # quá thấp thì kết thúc

# --- Domain Randomization ---
domain_randomization:
  enabled: true
  mass_range: [0.9, 1.1] # ±10% khối lượng
  friction_range: [0.7, 1.3] # ±30% ma sát
  joint_damping_range: [0.8, 1.2]
  push_interval: 500 # đẩy ngẫu nhiên mỗi 500 steps (~10s)
  push_magnitude: 0 # Stage 1: không push — robot học balance thuần trước
  push_duration: 5 # số steps giữ lực (5 × 0.02s = 0.1 giây mỗi lần đẩy)

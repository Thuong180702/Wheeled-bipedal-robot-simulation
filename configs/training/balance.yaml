# ============================================================
# Training config: Balance (Đứng vững)
# ============================================================

task:
  name: "balance"
  env: "BalanceEnv"
  episode_length: 1000 # 1000 steps × 0.02s = 20s
  num_envs: 4096 # số env song song trên GPU

# --- PPO Hyperparameters ---
ppo:
  learning_rate: 3.0e-4
  num_epochs: 4
  num_minibatches: 32
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coeff: 0.01
  value_loss_coeff: 0.5
  max_grad_norm: 0.5
  normalize_advantages: true

# --- Network ---
network:
  policy_hidden: [256, 256, 128]
  value_hidden: [256, 256, 128]
  activation: "elu"
  init_std: 0.15 # std ban đầu cho action distribution (nhỏ hơn vì ctrlrange rộng)

# --- Reward weights ---
# 15 thành phần: 11 thưởng + 4 phạt || tổng thưởng 8.6, tổng phạt -0.011
rewards:
  body_level: 1.5 # thưởng thân nằm ngang (exp kernel σ=0.15)
  height: 2.5 # thưởng giữ chiều cao theo height_command (exp kernel σ=0.1)
  natural_pose: 0.8 # thưởng hp/kn phù hợp chiều cao mục tiêu (exp kernel σ=0.5)
  symmetry: 0.5 # thưởng 2 chân đối xứng (exp kernel σ=0.3)
  no_motion: 0.3 # thưởng đứng yên (exp kernel σ=0.2)
  orientation: 0.5 # thưởng hướng body ổn định (phạt ang_vel)
  alive: 0.2 # thưởng sống sót mỗi step
  legs_forward: 0.5 # thưởng 2 chân hướng thẳng về trước (hip_yaw≈0)
  legs_vertical: 0.5 # thưởng 2 chân vuông góc mặt đất (hip_roll≈0)
  position_drift: 0.8 # thưởng giữ vị trí XY gần điểm reset (exp kernel σ=0.3)
  heading: 0.5 # thưởng giữ hướng yaw ban đầu (exp kernel σ=0.2)
  joint_torque: -0.0001 # phạt dùng mô-men lớn
  joint_velocity: -0.0001 # phạt tốc độ khớp lớn
  action_rate: -0.01 # phạt thay đổi action đột ngột
  wheel_velocity: -0.001 # phạt bánh xe quay (ít di chuyển hơn)

# --- Termination ---
termination:
  max_tilt_rad: 0.8 # ngã > 45° thì kết thúc
  min_height: 0.3 # quá thấp thì kết thúc

# --- Domain Randomization ---
domain_randomization:
  enabled: true
  mass_range: [0.9, 1.1] # ±10% khối lượng
  friction_range: [0.7, 1.3] # ±30% ma sát
  joint_damping_range: [0.8, 1.2]
  push_interval: 200 # đẩy ngẫu nhiên mỗi 200 steps
  push_magnitude: 30.0 # lực đẩy (N)

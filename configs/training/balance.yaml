# ============================================================
# Training config: Balance (Đứng vững)
# ============================================================

task:
  name: "balance"
  env: "BalanceEnv"
  episode_length: 1000 # 1000 steps × 0.02s = 20s
  num_envs: 4096 # số env song song trên GPU

# --- PPO Hyperparameters ---
ppo:
  learning_rate: 3.0e-4
  num_epochs: 4
  num_minibatches: 32
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coeff: 0.01
  value_loss_coeff: 0.5
  max_grad_norm: 0.5
  normalize_advantages: true

# --- Network ---
network:
  policy_hidden: [256, 256, 128]
  value_hidden: [256, 256, 128]
  activation: "elu"
  init_std: 1.0 # std ban đầu cho action distribution

# --- Reward weights ---
rewards:
  upright: 1.0 # thưởng đứng thẳng
  height: 0.5 # thưởng duy trì chiều cao
  joint_torque: -0.0001 # phạt dùng mô-men lớn
  joint_velocity: -0.0001 # phạt tốc độ khớp lớn
  action_rate: -0.001 # phạt thay đổi action đột ngột
  orientation: 0.3 # thưởng hướng body ổn định
  alive: 0.2 # thưởng sống sót mỗi step

# --- Termination ---
termination:
  max_tilt_rad: 0.8 # ngã > 45° thì kết thúc
  min_height: 0.3 # quá thấp thì kết thúc

# --- Domain Randomization ---
domain_randomization:
  enabled: true
  mass_range: [0.9, 1.1] # ±10% khối lượng
  friction_range: [0.7, 1.3] # ±30% ma sát
  joint_damping_range: [0.8, 1.2]
  push_interval: 200 # đẩy ngẫu nhiên mỗi 200 steps
  push_magnitude: 30.0 # lực đẩy (N)

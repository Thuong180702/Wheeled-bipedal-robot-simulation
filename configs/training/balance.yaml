# ============================================================
# Training config: Balance (Đứng vững)
# ============================================================

task:
  name: "balance"
  env: "BalanceEnv"
  episode_length: 1000 # 1000 steps × 0.02s = 20s
  num_envs: 4096 # số env song song trên GPU
  initial_min_height: 0.69 # min ban đầu

# --- Height Curriculum (reward-based) ---
# Mở rộng khoảng height_command khi robot đạt đủ reward
# Ban đầu [0.69, 0.70] → dần mở rộng → [0.40, 0.70]
# Chỉ tăng level khi avg_reward >= reward_threshold × max_possible_reward
curriculum:
  enabled: true
  reward_threshold: 0.85 # 85% tổng reward tối đa → mở rộng range
  num_levels: 29 # 29 cấp: mỗi cấp giảm min_height 0.01m (0.69 → 0.40)
  window: 50 # trung bình reward qua 50 updates gần nhất

# --- PPO Hyperparameters ---
ppo:
  learning_rate: 2.0e-4
  num_epochs: 4
  num_minibatches: 32
  rollout_length: 128
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coeff: 0.01
  value_loss_coeff: 0.5
  max_grad_norm: 0.5
  normalize_advantages: true
  seed: 42

# --- Network ---
network:
  policy_hidden: [256, 256, 128]
  value_hidden: [256, 256, 128]
  activation: "elu"
  init_std: 0.2

# --- Low-level PID (gần với điều khiển thực tế) ---
# Policy sinh target chuẩn hóa [-1, 1], PID low-level đổi sang torque/force actuator.
# - Khớp hông/gối: điều khiển vị trí (q_des)
# - Bánh xe: điều khiển vận tốc (dq_des)
low_level_pid:
  enabled: true
  action_smoothing_alpha: 0.4 # 0 = không lọc, 0.4~0.6 giúp giảm rung rõ
  anti_windup_limit: 0.35 # giới hạn tích phân lỗi
  wheel_vel_limit: 20.0 # rad/s khi action = ±1 cho bánh xe
  # Theo thứ tự JOINT_NAMES:
  # [l_hip_roll, l_hip_yaw, l_hip_pitch, l_knee, l_wheel,
  #  r_hip_roll, r_hip_yaw, r_hip_pitch, r_knee, r_wheel]
  kp: [55.0, 40.0, 70.0, 70.0, 4.0, 55.0, 40.0, 70.0, 70.0, 4.0]
  ki: [0.8, 0.4, 1.0, 1.0, 0.1, 0.8, 0.4, 1.0, 1.0, 0.1]
  kd: [3.0, 2.0, 4.0, 4.0, 0.2, 3.0, 2.0, 4.0, 4.0, 0.2]

# --- Reward weights ---
# OBJECTIVE: Pure standing balance (no push disturbance — push_magnitude=0 above).
#
# Separation note — terms that are STANDING-SPECIFIC and would conflict with
# push-recovery training if push_magnitude > 0:
#
#   no_motion      (+0.5)  Rewards zero linear velocity.
#                           → Would punish the wheel spin needed to absorb a push.
#                           Set to 0 in balance_robust.yaml.
#
#   wheel_velocity (-0.0006) Penalises wheel angular speed to keep robot stationary.
#                           → Would punish wheels acting as stabilisers during recovery.
#                           Set to 0 in balance_robust.yaml.
#
#   action_rate    (-0.025) Penalises rapid action changes.
#                           → For pure standing, this prevents jitter.
#                           → For push recovery, this penalises the fast wheel
#                             corrections fired immediately after impact.
#                           Reduced in balance_robust.yaml (see comments there).
#
# Terms shared safely with recovery:
#   body_level, height, natural_pose, symmetry, alive, heading,
#   legs_forward, legs_vertical, position_drift, orientation, yaw_rate,
#   joint_torque, joint_velocity
#
# Max reward ≈ 9.5 at perfect stance, mild penalties.
rewards:
  body_level: 1.5 # thưởng thân nằm ngang (exp σ_roll=0.15, σ_pitch=0.15)
  height: 2.5 # thưởng giữ chiều cao theo height_command (exp σ=0.25)
  natural_pose: 0.4 # thưởng hp/kn đúng target TUYỆT ĐỐI (exp σ=0.8 — gradient mạnh)
  symmetry: 0.5 # thưởng 2 chân đối xứng (exp σ=0.5)
  alive: 0.3 # thưởng sống sót (signal luôn có)
  heading: 0.5 # phá local optimum "spinning balance"
  legs_forward: 0.5
  legs_vertical: 0.5
  position_drift: 1.0 # phạt mạnh hơn khi robot drift
  orientation: 0.8
  yaw_rate: 0.5 # phạt trực tiếp tốc độ quay yaw
  # === Standing-specific (zero in balance_robust) ===
  no_motion: 0.5 # rewards stationary stance — conflicts with push recovery
  wheel_velocity: -0.0006 # penalises wheel spin — conflicts with push recovery
  # === Penalties ===
  joint_torque: -0.0005 # phạt mô-men lớn
  joint_velocity: -0.0006 # phạt tốc độ khớp
  action_rate: -0.025 # anti-jitter for standing; tighter than robust (see note above)

# --- Termination ---
termination:
  max_tilt_rad: 0.8 # ngã > 46° (0.8 rad) thì kết thúc
  min_height: 0.3 # quá thấp thì kết thúc

# --- Domain Randomization ---
domain_randomization:
  enabled: true
  mass_range: [0.9, 1.1] # ±10% khối lượng
  friction_range: [0.8, 1.2] # ±20% ma sát
  joint_damping_range: [0.8, 1.2]
  push_interval: 500 # đẩy ngẫu nhiên mỗi 500 steps (~10s)
  push_magnitude: 0 # Stage 1: không push — robot học balance thuần trước
  push_duration: 5 # số steps giữ lực (5 × 0.02s = 0.1 giây mỗi lần đẩy)

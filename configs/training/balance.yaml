# ============================================================
# Training config: Balance (Đứng vững)
# ============================================================

task:
  name: "balance"
  env: "BalanceEnv"
  episode_length: 1000 # 1000 steps × 0.02s = 20s
  num_envs: 4096 # số env song song trên GPU
  initial_min_height: 0.69 # min ban đầu

# --- Height Curriculum (eval-gated, internal to Stage 1) ---
# Implements the intended 3-phase balance progression:
#
#   Phase A — narrow balance  (levels 1–5):   height ∈ [~0.69–0.65, 0.70] m
#     Goal: learn stable upright stance near the nominal keyframe height.
#     No push disturbance. Robot starts from near-nominal pose.
#
#   Phase B — wider balance   (levels 6–20):  height ∈ [~0.64–0.50, 0.70] m
#     Goal: generalise to lower crouching targets while maintaining stability.
#
#   Phase C — full range      (levels 21–29): height ∈ [~0.49–0.40, 0.70] m
#     Goal: track any commanded height in [0.40, 0.70] — full operating range.
#
# Advancement requires all gates below:
#   training rollout reward >= train_reward_threshold
#   eval_per_step >= reward_threshold × max_reward_possible
#   eval_success_rate >= eval_success_threshold
#   eval_fall_rate <= eval_max_fall_rate
# Level step: (0.69 - 0.40) / 29 ≈ 0.01 m per level.
# Completing all 29 levels requires one eval-gated promotion per level.
# With V100 refinement config (4096 envs x 32 rollout = 131K steps/update) and
# eval_interval_steps=10M, curriculum checks run about every 77 updates.
curriculum:
  enabled: true
  train_reward_threshold: 7 # dùng chính dòng train reward=...; chặn promote khi policy còn rung/drift mạnh
  reward_threshold: 0.7 # 70% tổng reward tối đa → cần ~12.2*0.7=8.54/step để curriculum advance
  eval_success_threshold: 0.99 # không mở range nếu policy còn ngã đáng kể trong eval
  eval_max_fall_rate: 0.01 # với eval_envs=256: tối đa ~2 episode ngã/check
  num_levels: 29 # 29 cấp: mỗi cấp giảm min_height 0.01m (0.69 → 0.40)
  window: 50 # (legacy) rolling training-reward window — only used when use_eval_signal: false
  # Eval-gated curriculum signal: runs eval_pass() (greedy policy, complete episodes)
  # every eval_interval updates.  More trustworthy than the noisy per-rollout avg_reward.
  # The latest training reward=... line must also pass train_reward_threshold.
  # eval_per_step = eval_reward_mean / episode_length is compared against reward_threshold.
  # Then success/fall gates prevent promotion when the robot only survives marginally.
  use_eval_signal: true
  # JIT fixed-horizon eval runs one full episode per eval env on the accelerator.
  # This avoids the old Python per-step loop/device_get bottleneck on GPU.
  eval_mode: "jit_fixed_horizon"
  # Eval cadence: target number of env-steps between curriculum evals.
  # Trainer computes: eval_interval = ceil(eval_interval_steps / steps_per_update).
  # GPU (4096 envs x 32 steps = 131,072 steps/update): ~77 updates -> ~10 M steps/check.
  # CPU ( 128 envs x 32 steps =   4,096 steps/update): ~2442 updates -> ~10 M steps/check.
  eval_interval_steps: 10_000_000
  eval_envs: 256 # one fixed-horizon episode per eval env; V100-SXM2-32GB friendly
  eval_episodes: 256 # kept for metric intent/backward compatibility

evaluation:
  mode: "jit_fixed_horizon"
  eval_envs: 256
  eval_episodes: 256

# --- PPO Hyperparameters ---
ppo:
  learning_rate: 3.0e-4
  num_epochs: 4
  num_minibatches: 4
  rollout_length: 32
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coeff: 0.005
  value_loss_coeff: 1.0
  max_grad_norm: 0.5
  max_policy_kl: 0.03 # reject overly large PPO updates; 0 disables
  normalize_advantages: true
  seed: 42

# --- Network ---
network:
  policy_hidden: [256, 256, 128]
  value_hidden: [256, 256, 128]
  activation: "elu"
  init_std: 0.2

# --- Low-level controller (legs: PD+I position; wheels: PI velocity) ---
# Policy sinh target chuẩn hóa [-1, 1], low-level đổi sang torque actuator.
# - Khớp hông/gối: PD+I điều khiển vị trí (q_des)
# - Bánh xe: PI  điều khiển vận tốc (dq_des) — kd masked to 0 internally
#   (wheel velocity-error derivative = joint_accel, not joint_vel;
#    using -joint_vel would be a unit mismatch; see low_level_control.py)
low_level_pid:
  enabled: true
  action_smoothing_alpha: 0.5 # lọc mạnh hơn để giảm control jitter trong pure balance
  anti_windup_limit: 0.4 # giới hạn tích phân lỗi
  wheel_vel_limit: 20.0 # rad/s khi action = ±1 cho bánh xe
  # Theo thứ tự JOINT_NAMES:
  # [l_hip_roll, l_hip_yaw, l_hip_pitch, l_knee, l_wheel,
  #  r_hip_roll, r_hip_yaw, r_hip_pitch, r_knee, r_wheel]
  kp: [55.0, 40.0, 70.0, 70.0, 4.0, 55.0, 40.0, 70.0, 70.0, 4.0]
  ki: [0.8, 0.4, 1.0, 1.0, 0.1, 0.8, 0.4, 1.0, 1.0, 0.1]
  # kd indices 4 and 9 (wheels) are masked to 0 inside pid_control(); the
  # values here are kept non-zero only for reference — they have no effect.
  kd: [3.0, 2.0, 4.0, 4.0, 0.0, 3.0, 2.0, 4.0, 4.0, 0.0]
  # Action delay: integer number of control steps (0.02s each) to hold a command
  # before it reaches the PID controller.  Models CAN bus / EtherCAT latency.
  # 0  = disabled (sim_prototyping mode, current behaviour)
  # 1  = ~20 ms delay (typical real hardware — set this for sim2real_preparation)
  action_delay_steps: 0

# --- Reward weights ---
# OBJECTIVE: Pure standing balance (no push disturbance — push_magnitude=0 above).
#
# Separation note — terms that are STANDING-SPECIFIC and would conflict with
# push-recovery training if push_magnitude > 0:
#
#   no_motion      (+1.0)  Rewards zero linear velocity.
#                           → Would punish the wheel spin needed to absorb a push.
#                           Set to 0 in balance_robust.yaml.
#
#   wheel_velocity (-0.006)  Penalises wheel angular speed to keep robot stationary.
#                           → Would punish wheels acting as stabilisers during recovery.
#                           Set to 0 in balance_robust.yaml.
#
#   action_rate    (-0.08)  Penalises rapid action changes.
#                           → For pure standing, this prevents jitter.
#                           → For push recovery, this penalises the fast wheel
#                             corrections fired immediately after impact.
#                           Reduced in balance_robust.yaml (see comments there).
#
# Terms shared safely with recovery:
#   body_level, height, natural_pose, symmetry, alive, heading,
#   legs_forward, legs_vertical, position_drift, orientation, yaw_rate,
#   joint_torque, joint_velocity
#
# Max positive reward ~= 12.2 after anti-exploit standing terms.
rewards:
  body_level: 1.5 # thưởng thân nằm ngang (exp σ_roll=0.15, σ_pitch=0.15)
  height: 2.5 # thưởng giữ chiều cao theo height_command (exp σ=0.25)
  natural_pose: 0.4 # thưởng hp/kn đúng target TUYỆT ĐỐI (exp σ=0.5 — gradient mạnh)
  symmetry: 1.0 # thưởng 2 chân đối xứng (exp σ=0.3)
  alive: 0.3 # thưởng sống sót (signal luôn có)
  heading: 0.5 # phá local optimum "spinning balance"
  legs_forward: 0.5
  legs_vertical: 0.5
  position_drift: 2.5 # phạt mạnh khi robot drift khỏi vị trí ban đầu
  orientation: 1.0
  yaw_rate: 0.5 # phạt trực tiếp tốc độ quay yaw
  # === Standing-specific (zero in balance_robust) ===
  no_motion: 1.0 # rewards stationary stance; chống rolling/drift exploit
  wheel_velocity: -0.006 # penalises wheel spin; chống wheel-momentum exploit
  # === Penalties ===
  joint_torque: -0.0008 # phạt mô-men lớn
  joint_velocity: -0.001 # phạt tốc độ khớp
  action_rate: -0.08 # anti-jitter mạnh hơn cho pure standing

reward_params:
  position_drift_sigma: 0.25 # phạt drift sớm hơn; 0.5m quá rộng cho standing tại chỗ

# --- Termination ---
termination:
  max_tilt_rad: 0.8 # ngã > 46° (0.8 rad) thì kết thúc
  min_height: 0.3 # quá thấp thì kết thúc

# --- Domain Randomization ---
# mass/friction/damping applied per-episode via randomize_mjx_model() in BalanceEnv.reset().
# Keep nominal balance randomization moderate; balance_robust widens the ranges
# after the robot has learned a clean stationary stance.
domain_randomization:
  enabled: true
  mass_range: [0.9, 1.1] # nominal balance foundation; robust stage widens this
  friction_range: [0.7, 1.3] # avoid early friction exploit; widen in balance_robust
  joint_damping_range: [0.8, 1.2] # moderate damping variation for stable stance first
  push_interval: 500 # đẩy ngẫu nhiên mỗi 500 steps (~10s)
  push_magnitude: 0 # Stage 1: không push — robot học balance thuần trước
  push_duration: 5 # số steps giữ lực (5 × 0.02s = 0.1 giây mỗi lần đẩy)

# --- Sensor Noise & Observation Mode ---
#
# Training mode presets:
#
#   sim_prototyping (this file's defaults):
#     lin_vel_mode: "clean"          — simulator-exact velocity, no noise
#     action_delay_steps: 0          — no latency
#     Fastest to converge; validates reward design and curriculum.
#     WARNING: policy will rely on exact lin_vel → may degrade on hardware.
#
#   sim2real_preparation (uncomment overrides below):
#     lin_vel_mode: "noisy"          — lin_vel with realistic estimation error
#     lin_vel_std: 0.2               — typical state-estimator noise (m/s)
#     action_delay_steps: 1          — 1 step = ~20 ms CAN bus latency
#     Trains a policy that degrades gracefully when exact vel is unavailable.
#     Alternatively use lin_vel_mode: "disabled" to remove vel entirely.
#
# To activate sim2real_preparation mode, change:
#   sensor_noise.lin_vel_mode: "noisy"   (or "disabled")
#   low_level_pid.action_delay_steps: 1
#
sensor_noise:
  enabled: true
  # lin_vel_mode: controls base_lin_vel in policy observation.
  #   "clean"    : simulator-exact value (obs=39+extras, original behaviour)
  #   "noisy"    : lin_vel + Gaussian noise σ=lin_vel_std (obs=39+extras)
  #   "disabled" : lin_vel removed entirely (obs=36+extras, safest for sim2real)
  lin_vel_mode: "clean"
  lin_vel_std:
    0.2 # m/s — used only when lin_vel_mode="noisy"
    # Typical hardware IMU+encoder state estimator error.
  ang_vel_std: 0.05 # rad/s  — MEMS IMU gyro RMS at 50 Hz control bandwidth
  gravity_std: 0.02 # normalized  — accelerometer measurement noise
  joint_pos_std: 0.005 # rad  — ~0.3° encoder resolution noise
  joint_vel_std: 0.01 # rad/s  — encoder velocity estimation noise

# ============================================================
# Curriculum Learning Pipeline - 3 Stages
# ============================================================

curriculum:
  promotion_threshold: 0.8   # chuyen stage khi success_rate > 80%
  promotion_window: 100       # danh gia tren 100 episodes gan nhat
  demotion_threshold: 0.3     # neu < 30% thi quay lai stage truoc
  max_stage_steps: 5_000_000  # toi da buoc moi stage

  stages:
    # -------------------------------------------------------
    # Stage 1: Balance o nhieu chieu cao (co curriculum)
    # Robot hoc giu chieu cao co lenh, than ngang, on dinh.
    # Bat dau range [0.68, 0.72] → mo rong dan → [0.38, 0.72]
    # -------------------------------------------------------
    - name: "balance"
      description: "Dung vung o nhieu chieu cao (co height curriculum)"
      config: "configs/training/balance.yaml"
      terrain: "flat"
      success_metric: "upright_time"
      success_value: 15.0   # dung vung >= 15s lien tuc

    # -------------------------------------------------------
    # Stage 2: Dung len / Ngoi xuong + Phuc hoi tu nga
    # Warm-start tu balance. Robot hoc chuyen chieu cao chu dong
    # va dung day tu nhieu tu the nga khac nhau.
    # -------------------------------------------------------
    - name: "stand_up"
      description: "Chuyen doi chieu cao va phuc hoi tu nga"
      config: "configs/training/stand_up.yaml"
      terrain: "flat"
      success_metric: "height_tracking_error"
      success_value: 0.05   # sai so chieu cao < 5cm
      pretrained_from: "balance"

    # -------------------------------------------------------
    # Stage 3: Balance vung o bat ki chieu cao + chiu luc manh
    # Warm-start tu stand_up. Full range [0.38, 0.72] ngay tu dau.
    # Push disturbance manh hon (40N, moi 3s).
    # -------------------------------------------------------
    - name: "balance_robust"
      description: "Balance vung + chiu luc manh o bat ki chieu cao"
      config: "configs/training/balance_robust.yaml"
      terrain: "flat"
      success_metric: "upright_time"
      success_value: 15.0   # dung vung >= 15s duoi push manh
      pretrained_from: "stand_up"
